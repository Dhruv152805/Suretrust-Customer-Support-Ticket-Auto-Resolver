<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Ticket Resolver | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            min-height: 100vh;
            color: #f8fafc;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glow-border:focus-within {
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
            border-color: rgba(56, 189, 248, 0.5);
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .suggestion-card:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: scale(1.01);
            transition: all 0.2s ease;
        }
    </style>
</head>

<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1
                    class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-sky-400 to-indigo-500">
                    Auto-Resolver Dashboard
                </h1>
                <p class="text-slate-400 text-sm mt-1">AI-Powered Support Ticket Intelligence</p>
            </div>
            <div class="flex space-x-2">
                <span id="status-dot" class="h-2 w-2 rounded-full bg-green-500 mt-2 animate-pulse"></span>
                <span class="text-xs uppercase tracking-widest text-slate-500 font-semibold pt-1">API Online</span>
            </div>
        </header>

        <div class="grid grid-cols-1 gap-8">
            <!-- Main Content Area -->
            <div class="space-y-6">
                <div class="glass p-6 rounded-2xl glow-border">
                    <div class="flex items-center justify-between mb-3">
                        <label class="block text-sm font-medium text-slate-300">Customer Complaint / Query</label>
                        <div class="glass px-4 py-2 rounded-xl">
                            <div class="flex items-center space-x-2">
                                <span class="text-slate-400 text-xs">Total Solved</span>
                                <span id="session-count" class="text-slate-200 font-medium text-sm">0</span>
                            </div>
                        </div>
                    </div>
                    <textarea id="query-input" rows="5"
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-sky-500 transition-all"
                        placeholder="Paste the message here"></textarea>

                    <div class="mt-6 flex flex-wrap items-center justify-between gap-4">
                        <div
                            class="flex items-center space-x-3 bg-slate-800/40 p-3 rounded-lg border border-slate-700/50">
                            <svg class="w-5 h-5 text-indigo-400" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z"></path>
                            </svg>
                            <span class="text-sm text-slate-200 font-semibold">Comparing All 4 Models</span>
                        </div>

                        <button id="solve-btn"
                            class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 px-8 rounded-xl transition-all flex items-center shadow-lg shadow-indigo-500/20 active:scale-95">
                            <span>Analyze Now</span>
                            <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Results Area -->
                <div id="results-skeleton" class="hidden animate-pulse space-y-4">
                    <div class="h-4 bg-slate-800 rounded w-1/4"></div>
                    <div class="h-40 bg-slate-800 rounded-2xl w-full"></div>
                </div>

                <div id="results-container" class="hidden space-y-8">
                    <!-- Model Comparison Grid -->
                    <div id="model-comparison-container" class="w-full">
                        <div id="model-comparison-results" class="space-y-4 w-full">
                            <!-- Model comparison cards injected here -->
                        </div>
                    </div>

                    <!-- AI synthesized response -->
                    <div id="ai-agent-container" class="hidden">
                        <div class="flex items-center space-x-2 mb-4">
                            <div
                                class="flex-shrink-0 w-8 h-8 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                                <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20">
                                    <path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"></path>
                                    <path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z"></path>
                                </svg>
                            </div>
                            <h2 class="text-lg font-bold text-white">Agent Response</h2>
                        </div>
                        <div
                            class="glass p-6 rounded-2xl border-t-2 border-indigo-500/50 shadow-xl shadow-indigo-500/5 relative overflow-hidden group">
                            <div class="absolute top-0 right-0 p-4 opacity-5 pointer-events-none">
                                <svg class="w-24 h-24" fill="currentColor" viewBox="0 0 24 24">
                                    <path
                                        d="M14.017 21L14.017 18C14.017 16.8954 13.1216 16 12.017 16H9.01705C7.91248 16 7.01705 16.8954 7.01705 18V21H5.01705V18C5.01705 15.7909 6.80791 14 9.01705 14H12.017C14.2262 14 16.017 15.7909 16.017 18V21H14.017Z">
                                    </path>
                                </svg>
                            </div>
                            <button onclick="copyToClipboard()"
                                class="absolute top-4 right-4 p-2 rounded-lg bg-slate-800/50 hover:bg-slate-700 text-slate-400 hover:text-white opacity-0 group-hover:opacity-100 transition-all border border-slate-700 shadow-lg">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3">
                                    </path>
                                </svg>
                            </button>
                            <p id="llm-response-text" class="text-slate-200 leading-relaxed italic text-lg"></p>
                        </div>
                    </div>

                    <div class="hidden">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-lg font-semibold text-slate-200">Historical References</h2>
                            <span id="confidence-badge"
                                class="px-3 py-1 bg-green-500/10 border border-green-500/30 text-green-400 text-xs rounded-full font-bold uppercase tracking-wider">
                                High Confidence
                            </span>
                        </div>
                        <div id="solutions-list" class="space-y-4">
                            <!-- Cards injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Feedback Modal / Success Toast -->
    <div id="toast"
        class="fixed bottom-8 right-8 glass px-6 py-3 rounded-xl transform translate-y-24 opacity-0 transition-all duration-300 flex items-center border border-green-500/30">
        <span class="text-green-400 mr-2">✓</span>
        <span class="text-sm font-medium">Feedback submitted successfully!</span>
    </div>

    <script>
        const queryInput = document.getElementById('query-input');
        const solveBtn = document.getElementById('solve-btn');
        const resultsContainer = document.getElementById('results-container');
        const resultsSkeleton = document.getElementById('results-skeleton');
        const modelComparisonResults = document.getElementById('model-comparison-results');
        const sessionCount = document.getElementById('session-count');
        const toast = document.getElementById('toast');

        let solvedCount = 0;
        let allModelResults = [];

        async function solveTicket() {
            const text = queryInput.value.trim();
            if (!text) {
                queryInput.classList.add('border-red-500');
                setTimeout(() => queryInput.classList.remove('border-red-500'), 2000);
                return;
            }

            // UI Feedback
            solveBtn.disabled = true;
            solveBtn.querySelector('span').innerText = 'Running 4 models...';
            resultsContainer.classList.add('hidden');
            resultsSkeleton.classList.remove('hidden');

            const models = ['tfidf_lr', 'w2v_xgb', 'bert', 'ensemble'];
            const startTime = performance.now();

            try {
                // Call all 4 models in parallel
                const promises = models.map(async model => {
                    const modelStart = performance.now();
                    const response = await fetch('/predict', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            text: text,
                            model: model,
                            top_k: 3
                        })
                    });
                    const data = await response.json();
                    const modelEnd = performance.now();
                    return {
                        ...data,
                        latency: modelEnd - modelStart
                    };
                });

                allModelResults = await Promise.all(promises);
                const endTime = performance.now();

                // Update session counter
                solvedCount++;
                sessionCount.innerText = solvedCount;

                renderComparisonResults(allModelResults);
            } catch (err) {
                console.error(err);
                alert('Oops! Failed to connect to the backend. Is it running?');
            } finally {
                solveBtn.disabled = false;
                solveBtn.querySelector('span').innerText = 'Analyze Now';
                resultsSkeleton.classList.add('hidden');
            }
        }

        function renderComparisonResults(results) {
            resultsContainer.classList.remove('hidden');
            resultsContainer.classList.add('animate-fade-in');

            // Find best model (highest confidence)
            const bestModel = results.reduce((best, curr) => 
                curr.confidence > best.confidence ? curr : best
            );

            // Create comparison table with header
            modelComparisonResults.innerHTML = '';
            
            const modelNames = {
                'tfidf_lr': 'TF-IDF + LogReg',
                'w2v_xgb': 'Word2Vec + XGB',
                'bert': 'DistilBERT',
                'ensemble': 'Ensemble'
            };

            // Model order: top-left, top-right, bottom-left, bottom-right
            const orderedModels = ['tfidf_lr', 'w2v_xgb', 'bert', 'ensemble'];
            const orderedResults = orderedModels.map(modelKey => 
                results.find(r => r.model_used === modelKey)
            ).filter(r => r);

            // Header
            const header = document.createElement('div');
            header.className = 'mb-4';
            header.innerHTML = `
                <h3 class="text-lg font-bold text-slate-200 flex items-center space-x-2">
                    <svg class="w-5 h-5 text-indigo-400" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z"></path>
                    </svg>
                    <span>Model Comparison</span>
                </h3>
                <p class="text-xs text-slate-400 mt-1">Showing predictions from all 4 classification models</p>
            `;
            modelComparisonResults.appendChild(header);

            // Comparison Grid (2x2 matrix)
            const comparisonGrid = document.createElement('div');
            comparisonGrid.className = 'grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 w-full auto-rows-fr';

            orderedResults.forEach(result => {
                const card = document.createElement('div');
                const isBest = result.model_used === bestModel.model_used;
                card.className = `glass p-5 rounded-xl border-2 transition-all hover:scale-[1.02] w-full flex flex-col ${isBest ? 'border-green-500/60 bg-green-500/10 shadow-lg shadow-green-500/20' : 'border-slate-700/50'}`;
                
                const conf = result.confidence * 100;
                const confColor = conf > 70 ? 'text-green-400' : conf > 40 ? 'text-yellow-400' : 'text-red-400';
                const confBg = conf > 70 ? 'bg-green-500/10' : conf > 40 ? 'bg-yellow-500/10' : 'bg-red-500/10';
                
                card.innerHTML = `
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center space-x-2">
                            <span class="font-bold text-lg text-slate-100">${modelNames[result.model_used]}</span>
                            ${isBest ? '<span class="text-[10px] bg-green-500/30 text-green-300 px-2 py-1 rounded-full border border-green-500/50 font-bold tracking-wider">⭐ BEST</span>' : ''}
                        </div>
                    </div>
                    <div class="space-y-3 flex-1">
                        <div class="flex items-center justify-between p-2 rounded-lg bg-slate-800/30">
                            <span class="text-xs text-slate-400 font-semibold uppercase tracking-wide">Category</span>
                            <span class="text-base font-bold text-slate-100">${result.predicted_category}</span>
                        </div>
                        <div class="flex items-center justify-between p-2 rounded-lg ${confBg}">
                            <span class="text-xs text-slate-400 font-semibold uppercase tracking-wide">Confidence</span>
                            <span class="text-xl font-bold ${confColor}">${conf.toFixed(1)}%</span>
                        </div>
                        <div class="flex items-center justify-between pt-2 border-t border-slate-700/50">
                            <span class="text-xs text-slate-500 font-semibold uppercase tracking-wide">Latency</span>
                            <span class="text-sm font-mono text-slate-300">${Math.round(result.latency)}ms</span>
                        </div>
                        ${result.llm_response ? `
                        <div class="mt-4 pt-4 border-t border-slate-700/50">
                            <div class="flex items-center space-x-2 mb-2">
                                <svg class="w-4 h-4 text-indigo-400" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"></path>
                                </svg>
                                <span class="text-xs text-slate-400 font-semibold uppercase tracking-wide">Generated Response</span>
                            </div>
                            <p class="text-sm text-slate-300 leading-relaxed bg-slate-800/40 p-3 rounded-lg">${result.llm_response}</p>
                        </div>
                        ` : ''}
                    </div>
                `;
                comparisonGrid.appendChild(card);
            });

            modelComparisonResults.appendChild(comparisonGrid);

            // Hide the separate Agent Response section since responses are now in cards
            const llmContainer = document.getElementById('ai-agent-container');
            llmContainer.classList.add('hidden');
        }

        function renderResults(data) {
            // Fallback for single model (not used anymore)
            renderComparisonResults([data]);
        }

        function renderSingleModelLegacy(data) {
            // Old function - keeping for reference
            resultsContainer.classList.remove('hidden');
            solutionsList.innerHTML = '';
            data.suggested_solutions.forEach((sol, idx) => {
                const card = document.createElement('div');
                card.className = 'glass p-5 rounded-2xl suggestion-card border border-slate-700/50';
                card.innerHTML = `
                    <div class="flex items-start justify-between mb-3">
                        <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Match #${idx + 1}</span>
                        <div class="flex items-center space-x-2">
                            <button onclick="submitFeedback('${data.query}', '${data.predicted_category}', true)" class="text-slate-500 hover:text-green-400 transition-colors">👍</button>
                            <button onclick="submitFeedback('${data.query}', '${data.predicted_category}', false)" class="text-slate-500 hover:text-red-400 transition-colors">👎</button>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <div>
                            <p class="text-xs text-slate-500 mb-1 font-semibold uppercase">Similar Past Issue</p>
                            <p class="text-sm text-slate-300 line-clamp-2 italic">"${sol.similar_issue}"</p>
                        </div>
                        <div class="p-3 bg-slate-900/50 rounded-xl border border-indigo-500/10">
                            <p class="text-xs text-indigo-400 mb-1 font-semibold uppercase">Suggested Solution</p>
                            <p class="text-sm text-slate-200">${sol.suggested_solution}</p>
                        </div>
                    </div>
                `;
                solutionsList.appendChild(card);
            });
        }

        async function submitFeedback(query, category, isCorrect) {
            try {
                await fetch('/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: query,
                        predicted_category: category,
                        is_correct: isCorrect
                    })
                });

                showToast('Feedback submitted successfully!');
            } catch (err) {
                console.error('Feedback failed:', err);
            }
        }

        function copyToClipboard() {
            const text = document.getElementById('llm-response-text').innerText;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                showToast('Copied to clipboard!');
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.querySelector('span:last-child').innerText = message;
            toast.classList.remove('translate-y-24', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-24', 'opacity-0');
            }, 3000);
        }

        solveBtn.addEventListener('click', solveTicket);
    </script>
</body>

</html>
